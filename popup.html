<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FirstOne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="app">

    <div class="header">
      <div class="logo">
        <img src="doge-logo.png" alt="avatar"/>
        <span>FirstOne</span>
      </div>
      <a class="infobtn" href="https://github.com/dexterMorgaN-9/firstone/blob/main/README.md" target="_blank" title="How it works">i</a>
    </div>

    <div class="coin-wrap">
      <div class="coin">
        <img src="doge-coin.png" alt="doge"/>
        <span id="coinCount">0</span>
      </div>
    </div>

    <div class="prog">
      <div class="prog-labels">
        <span>next coin in</span>
        <span id="nextCoinLabel">10 mins</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <b id="workMins">0</b>
        <small>mins worked</small>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <b>15</b>
        <small>coins per 10 min</small>
      </div>
    </div>

    <div class="footnote">resets every midnight 🌙</div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
